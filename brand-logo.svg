<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="HabitFlow HF logo">
  <defs>
    <radialGradient id="bgGlow" cx="24%" cy="20%" r="78%">
      <stop offset="0" stop-color="#241015"/>
      <stop offset="0.46" stop-color="#050505"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="letters" x1="58" y1="62" x2="200" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.42" stop-color="#f6f6f7"/>
      <stop offset="0.7" stop-color="#d9d9dc"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="accent" x1="50" y1="216" x2="208" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e11d48"/>
      <stop offset="0.55" stop-color="#ff4d6d"/>
      <stop offset="1" stop-color="#7f1028"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.75"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#e11d48" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#bgGlow)"/>
  <rect x="9" y="9" width="238" height="238" rx="46" fill="none" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2"/>
  <text x="128" y="152" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="104" font-weight="900"
        letter-spacing="-13" fill="url(#letters)" filter="url(#softShadow)">HF</text>
  <path d="M58 208 C86 221, 169 221, 198 208" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
</svg>
