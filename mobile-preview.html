<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HabitFlow Mobile Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      background: #050505;
      font-family: Inter, system-ui, sans-serif;
    }
    .phone {
      width: min(100vw, 393px);
      height: 100dvh;
      background: #000;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="phone">
    <iframe src="/index.html?mobile-preview=1"></iframe>
  </div>
</body>
</html>
