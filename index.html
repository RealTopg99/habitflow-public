<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="HabitFlow: sistema personal de hábitos, agenda, metas, entreno y finanzas.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HabitFlow">
  <meta name="mobile-web-app-capable" content="yes">
  <meta property="og:title" content="HabitFlow - Habit Tracker">
  <meta property="og:description" content="Sistema personal de hábitos, agenda, metas, entreno y finanzas.">
  <meta property="og:image" content="https://habitflow-public.pages.dev/icon-512-20260603.png">
  <meta property="og:url" content="https://habitflow-public.pages.dev/">
  <meta property="og:type" content="website">
  <link rel="icon" href="./favicon.svg?v=20260603" type="image/svg+xml">
  <link rel="icon" href="./icon-192-20260603.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="./apple-touch-icon-20260603.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-20260603.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./mobile-v2.css?v=20260714-mobile-capture-layout-v5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>HabitFlow - Habit Tracker</title>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000000; font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; }
    #root { min-height: 100vh; }
    .skip-link { position: fixed; left: 16px; top: 12px; z-index: 10000; padding: 10px 14px; border-radius: 10px; background: #ff0000; color: #fff; font-weight: 700; text-decoration: none; transform: translateY(-160%); transition: transform .2s ease; }
    .skip-link:focus { transform: translateY(0); }
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; color: #9a9a9a; font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; }
    .loading-logo { width: 72px; height: 72px; border-radius: 18px; box-shadow: 0 0 0 1px rgba(255,255,255,0.10), 0 18px 46px rgba(0,0,0,0.52), 0 0 28px rgba(255,0,0,0.16); }
    .spinner { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #171717; border-top-color: #ff0000; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ff6b6b; padding: 40px; font-family: 'Inter', sans-serif; max-width: 800px; margin: 40px auto; line-height: 1.6; }
    .error h2 { margin-bottom: 16px; color: #ff6b6b; }
    .error pre { background: #1a1a26; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin-top: 12px; color: #e8e8f0; }
  </style>
</head>
<body>
  <a class="skip-link" href="#habitflow-main">Saltar al contenido</a>
  <div id="root">
    <div class="loading">
      <img class="loading-logo" src="./brand-logo.svg" alt="HabitFlow">
      <div>Cargando HabitFlow...</div>
      <div class="spinner"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PropTypes needed by recharts UMD -->
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="./widget-sync-core.js"></script>
  <script src="./exercise-dataset-service.js"></script>

  <script>
  window.HABITFLOW_CLERK_PUBLISHABLE_KEY = 'pk_test_cHVtcGVkLWNoaW1wLTgxLmNsZXJrLmFjY291bnRzLmRldiQ';
  window.HABITFLOW_VAPID_PUBLIC_KEY = 'BGUhZfPku2FBDwsDQu7TFC5TltxEWSBcs2mRx8SKZPaAIVmEBubKHS4RJtLz5BBKki4vriHh7XwmILk8iG_cbhg';
  window.HABITFLOW_DEV_AUTH_BYPASS = ['localhost', '127.0.0.1', ''].includes(window.location.hostname)
    && new URLSearchParams(window.location.search).has('dev-preview');

  window.addEventListener('DOMContentLoaded', async function initApp() {
    try {
      const rootEl = document.getElementById('root');
      if ('serviceWorker' in navigator && (window.isSecureContext || ['localhost', '127.0.0.1'].includes(window.location.hostname))) {
        let reloadingForUpdate = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloadingForUpdate) return;
          reloadingForUpdate = true;
          window.location.reload();
        });
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then(registration => {
          registration.update().catch(() => {});
          window.addEventListener('focus', () => registration.update().catch(() => {}));
          window.addEventListener('online', () => registration.update().catch(() => {}));
        }).catch(() => {});
      }

      // Load lucide-react
      window.lucideReact = await import('https://cdn.jsdelivr.net/npm/lucide-react@0.263.0/+esm');

      // Load Supabase
      const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
      window.HABITFLOW_SUPABASE_URL = 'https://mbqchbwzfyjxynjbtgws.supabase.co';
      window.HABITFLOW_SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_112gMTbx7ZdkgGzB_AoM5g_fyKLiRIj';
      window.createSupabaseClient = createClient;
      window.supabaseClient = createClient(window.HABITFLOW_SUPABASE_URL, window.HABITFLOW_SUPABASE_PUBLISHABLE_KEY);

      // Load recharts UMD
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/recharts@2.12.0/umd/Recharts.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('No se pudo cargar Recharts UMD'));
        document.head.appendChild(s);
      });

      if (typeof window.Recharts === 'undefined' || typeof window.Recharts.LineChart === 'undefined') {
        throw new Error('Recharts no tiene componentes. Verifica la consola.');
      }

      console.log('Recharts OK, componentes:', Object.keys(window.Recharts).filter(k => k[0] === k[0].toUpperCase()).join(', '));

      const mobileV2Resp = await fetch('./MobileTabletV2.jsx?_=' + Date.now());
      if (!mobileV2Resp.ok) throw new Error('Error al cargar MobileTabletV2.jsx: HTTP ' + mobileV2Resp.status);
      const mobileV2Code = new TextDecoder('utf-8').decode(await mobileV2Resp.arrayBuffer());
      const mobileV2Result = Babel.transform(mobileV2Code, { presets: [['react', { runtime: 'classic' }]] });
      new Function('React', mobileV2Result.code)(React);
      if (!window.HabitFlowMobileV2?.MobileTabletV2App) throw new Error('El shell Mobile/Tablet V2 no pudo inicializarse.');

      const workoutResp = await fetch('./WorkoutFeature.jsx?_=' + Date.now());
      if (!workoutResp.ok) throw new Error('Error al cargar WorkoutFeature.jsx: HTTP ' + workoutResp.status);
      const workoutCode = new TextDecoder('utf-8').decode(await workoutResp.arrayBuffer());
      const workoutResult = Babel.transform(workoutCode, { presets: [['react', { runtime: 'classic' }]] });
      new Function('React', workoutResult.code)(React);
      if (typeof window.HabitFlowWorkoutRedesign !== 'function') {
        throw new Error('El módulo Entreno no pudo inicializarse.');
      }

      const resp = await fetch('./HabitTrackerApp.jsx?_=' + Date.now());
      if (!resp.ok) throw new Error('Error al cargar HabitTrackerApp.jsx: HTTP ' + resp.status);
      const buf = await resp.arrayBuffer();
      let code = new TextDecoder('utf-8').decode(buf);

      code = code.replace(/import React, \{([\s\S]*?)\} from 'react';/, 'const {$1} = React;');
      code = code.replace(/import \{([\s\S]*?)\} from 'recharts';/, 'const {$1} = Recharts;');
      code = code.replace(/import \{([\s\S]*?)\} from 'lucide-react';/, 'const {$1} = lucideReact;');
      code = code.replace('export default App;', 'window.__App = App;');

      const result = Babel.transform(code, { presets: [['react', { runtime: 'classic' }]] });

      const fn = new Function('React', 'ReactDOM', result.code);
      fn(React, ReactDOM);

      const root = ReactDOM.createRoot(rootEl);
      root.render(React.createElement(window.__App));

    } catch (err) {
      console.error('HabitFlow error:', err);
      document.getElementById('root').innerHTML =
        '<div class="error">' +
        '<h2>Error al cargar la aplicaci\u00f3n</h2>' +
        '<p>' + err.message + '</p>' +
        (err.stack ? '<pre>' + err.stack.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>' : '') +
        '<p style="margin-top:16px;color:#8888a0;">Abre la consola (F12) para m\u00e1s detalles.</p></div>';
    }
  });
  </script>
</body>
</html>
